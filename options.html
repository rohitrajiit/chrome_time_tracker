<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Website Time Tracker Options</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">Daily Website Time Tracker</p>
        <h1>Options</h1>
      </header>

      <section>
        <h2>Day boundary</h2>
        <p>Daily totals start at 5:00 AM local time and run until 4:59 AM the next day.</p>
      </section>

      <section>
        <h2>Stored data</h2>
        <p id="storageSummary">Loading tracked data...</p>
        <button id="resetAllButton" type="button">Reset all tracked data</button>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
</html>
